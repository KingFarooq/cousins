<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cousins · Prove You Belong</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080808;--bg2:#111;--bg3:#1a1a1a;
  --text:#f0f0f0;--dim:rgba(240,240,240,.55);--muted:rgba(240,240,240,.28);
  --accent:#e8c97e;--accent2:#c4784a;
  --border:rgba(255,255,255,.09);
  --wrong:#ff4f4f;--right:#4fffb0;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.035;pointer-events:none;z-index:9999;}

#quiz-screen{min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:40px 20px 60px;position:relative;}
.glow{position:fixed;top:-20%;left:50%;transform:translateX(-50%);
  width:700px;height:700px;border-radius:50%;pointer-events:none;z-index:0;
  background:radial-gradient(circle,rgba(232,201,126,.055) 0%,transparent 70%);
  animation:breathe 5s ease-in-out infinite;}
@keyframes breathe{0%,100%{transform:translateX(-50%) scale(1);opacity:.6}50%{transform:translateX(-50%) scale(1.15);opacity:1}}
.wrap{position:relative;z-index:1;width:100%;max-width:620px;}

.hdr{text-align:center;margin-bottom:44px;animation:up .7s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--accent);margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:10px;}
.eyebrow::before,.eyebrow::after{content:'';display:block;height:1px;width:28px;
  background:linear-gradient(to right,transparent,var(--accent));}
.eyebrow::after{transform:scaleX(-1);}
.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,10vw,82px);
  letter-spacing:.04em;line-height:.92;margin-bottom:14px;}
.title span{color:var(--accent);}
.subtitle{font-size:13.5px;color:var(--dim);line-height:1.65;font-weight:300;
  max-width:420px;margin:0 auto;}

.prog-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px;
  animation:up .7s .05s cubic-bezier(.34,1.56,.64,1) both;}
.prog-track{width:100%;height:2px;background:var(--border);border-radius:2px;
  margin-bottom:32px;overflow:hidden;animation:up .7s .1s cubic-bezier(.34,1.56,.64,1) both;}
.prog-fill{height:100%;width:0%;border-radius:2px;
  background:linear-gradient(to right,var(--accent2),var(--accent));
  transition:width .55s cubic-bezier(.4,0,.2,1);}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:28px 28px 24px;margin-bottom:14px;position:relative;overflow:hidden;
  animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,rgba(232,201,126,.4),transparent);}
.q-num{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.q-text{font-size:17px;font-weight:500;line-height:1.55;margin-bottom:24px;}

.opts{display:grid;gap:9px;}
.opt{display:flex;align-items:center;gap:14px;background:var(--bg3);
  border:1px solid var(--border);border-radius:8px;padding:13px 17px;
  color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:400;text-align:left;width:100%;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;user-select:none;}
.opt::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(232,201,126,.07) 0%,transparent 60%);
  opacity:0;transition:opacity .2s;}
.opt:hover{border-color:rgba(232,201,126,.4);transform:translateX(4px);background:rgba(28,28,28,1);}
.opt:hover::after{opacity:1;}
.opt-letter{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;
  width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--accent);
  flex-shrink:0;transition:all .2s;}
.opt:hover .opt-letter{background:rgba(232,201,126,.15);border-color:rgba(232,201,126,.5);}
.opt.selected{border-color:rgba(232,201,126,.6);background:rgba(232,201,126,.08);}
.opt.selected .opt-letter{background:rgba(232,201,126,.25);border-color:var(--accent);}
.opt.correct{border-color:var(--right)!important;background:rgba(79,255,176,.08)!important;pointer-events:none;}
.opt.correct .opt-letter{background:rgba(79,255,176,.25)!important;border-color:var(--right)!important;color:var(--right)!important;}
.opt.wrong{border-color:var(--wrong)!important;background:rgba(255,79,79,.08)!important;pointer-events:none;}
.opt.wrong .opt-letter{background:rgba(255,79,79,.25)!important;border-color:var(--wrong)!important;color:var(--wrong)!important;}
.opt.disabled{pointer-events:none;opacity:.45;}

.feedback{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;
  padding:10px 14px;border-radius:6px;margin-top:4px;display:none;
  animation:up .35s cubic-bezier(.34,1.56,.64,1) both;}
.feedback.show{display:block;}
.feedback.ok{background:rgba(79,255,176,.08);border:1px solid rgba(79,255,176,.3);color:var(--right);}
.feedback.bad{background:rgba(255,79,79,.08);border:1px solid rgba(255,79,79,.3);color:var(--wrong);}

.submit-wrap{display:flex;justify-content:flex-end;margin-top:6px;}
.submit-btn{background:transparent;border:1px solid rgba(232,201,126,.35);border-radius:8px;
  padding:12px 28px;color:var(--accent);cursor:pointer;
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  transition:all .25s;display:none;}
.submit-btn.show{display:block;}
.submit-btn:hover{background:rgba(232,201,126,.1);border-color:var(--accent);}
.submit-btn:disabled{opacity:.35;cursor:not-allowed;}

.fail-banner{background:rgba(255,79,79,.07);border:1px solid rgba(255,79,79,.3);
  border-radius:8px;padding:14px 18px;margin-top:12px;display:none;
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--wrong);}
.fail-banner.show{display:block;animation:up .35s cubic-bezier(.34,1.56,.64,1) both;}

#success-screen{min-height:100vh;display:none;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
#success-screen.show{display:flex;}
.success-icon{font-size:56px;margin-bottom:24px;animation:pop .6s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.success-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,10vw,80px);
  letter-spacing:.04em;margin-bottom:14px;color:var(--right);}
.success-sub{font-size:14px;color:var(--dim);line-height:1.65;margin-bottom:36px;max-width:380px;}
.gallery-btn{display:inline-block;background:var(--accent);color:#000;
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  padding:14px 36px;border-radius:8px;text-decoration:none;cursor:pointer;border:none;
  transition:all .25s;font-weight:500;}
.gallery-btn:hover{background:var(--accent2);transform:scale(1.04);}
</style>
</head>
<body>

<div id="quiz-screen">
  <div class="glow"></div>
  <div class="wrap">
    <div class="hdr">
      <div class="eyebrow">Members Only</div>
      <div class="title">You <span>Sure</span><br>You Belong?</div>
      <p class="subtitle">Only real cousins know these. Answer all 6 correctly to get in.</p>
    </div>
    <div class="prog-label" id="prog-label">Question 1 of 6</div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    <div id="q-container"></div>
    <div id="feedback" class="feedback"></div>
    <div id="fail-banner" class="fail-banner"></div>
    <div class="submit-wrap">
      <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">Confirm →</button>
    </div>
  </div>
</div>

<div id="success-screen">
  <div class="success-icon">🎉</div>
  <div class="success-title">You're In.</div>
  <p class="success-sub">Verified cousin. Welcome to the memories. 🫂</p>
  <button class="gallery-btn" onclick="unlockGallery()">Open The Gallery →</button>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// Answers are stored as SHA-256 hashes only.
// Even with inspect element, no one can reverse a hash to get the answer.
// Options are shuffled into a random order on every single page load.
// ─────────────────────────────────────────────────────────────────
const QUESTIONS = [
  {
    q: "What's the correct ad-lib?",
    h: 'a0ea5328f032f1557fbc5d6516c59cc85e7c0fa270c43085f9c994ef2915449b',
    opts: ['jellyfish', 'guitar', 'yeah', 'ayy']
  },
  {
    q: 'Finish this: "HELP! HELP! _____ ITS LEAKING! WHAT DO I DO?"',
    h: '8ed20cc647da6ff8d0babadf3f19b03e69371837cbed00a64546936db3c6f2e7',
    opts: ['Maryam', 'BRO', 'Nabiha', 'BRUH']
  },
  {
    q: 'Who is most likely to be a trucker?',
    h: 'faf6ef2f4fa5055476c68034521d50a3be3bf49bc9d742cbcb8d5eb45b2ae7ef',
    opts: ['Hassaan', 'Zubair', 'Talha', 'Farooq']
  },
  {
    q: 'Who is a teacher?',
    h: '56d9df185e8b9e3a7fbce014bf330dad67d8e5f5906529ae8d79482fc0310322',
    opts: ['Nabiha', 'Talha', 'Maryam', 'Farooq']
  },
  {
    q: 'Who was "sick" on every trip to Nashville?',
    h: '78f3147cd91db76f0b024f12cd0671c865d806172c0a483ee3be5d3ba4bcdd90',
    opts: ['Farooq', 'Maryam', 'our parents', 'Nabiha']
  },
  {
    q: 'Who is the group baby / hamster?',
    h: 'b703ef337f3bddbdacf9f096217658fe6f670b8d2696e8909c3e4c185ccbeda4',
    opts: ['Zubair', 'Maryam', 'hamster', "Nabiha's turtle"]
  }
];

// Fisher-Yates shuffle — runs fresh on every page load
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Build randomised option order once per session load
const SHUFFLED = QUESTIONS.map(q => ({ ...q, shuffled: shuffle(q.opts) }));

// SHA-256 via Web Crypto (built into every modern browser, no library needed)
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str.toLowerCase().trim()));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

let current = 0;
let selected = null;
let wrongCount = 0;
const LETTERS = ['A','B','C','D'];

function renderQuestion() {
  const q = SHUFFLED[current];
  selected = null;

  document.getElementById('prog-label').textContent = `Question ${current + 1} of ${QUESTIONS.length}`;
  document.getElementById('prog-fill').style.width = ((current / QUESTIONS.length) * 100) + '%';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('fail-banner').className = 'fail-banner';
  document.getElementById('submit-btn').className = 'submit-btn';
  document.getElementById('submit-btn').disabled = false;

  const container = document.getElementById('q-container');
  container.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="q-num">Question ${String(current+1).padStart(2,'0')} / ${String(QUESTIONS.length).padStart(2,'0')}</div>
    <div class="q-text">${q.q}</div>
    <div class="opts" id="opts"></div>
  `;
  container.appendChild(card);

  const optsEl = document.getElementById('opts');
  q.shuffled.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.dataset.i = i;
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => selectOption(i));
    optsEl.appendChild(btn);
  });
}

function selectOption(i) {
  selected = i;
  document.querySelectorAll('.opt').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  document.getElementById('submit-btn').classList.add('show');
}

async function submitAnswer() {
  if (selected === null) return;

  const q = SHUFFLED[current];
  const chosenText = q.shuffled[selected];
  const hash = await sha256(chosenText);
  const correct = hash === q.h;
  const opts = document.querySelectorAll('.opt');

  opts.forEach(b => b.classList.add('disabled'));

  if (correct) {
    opts[selected].classList.remove('selected');
    opts[selected].classList.add('correct');
    const fb = document.getElementById('feedback');
    fb.className = 'feedback ok show';
    fb.textContent = '✓  Correct.';
    document.getElementById('submit-btn').className = 'submit-btn';

    setTimeout(() => {
      current++;
      if (current < QUESTIONS.length) renderQuestion();
      else showSuccess();
    }, 900);

  } else {
    wrongCount++;
    opts[selected].classList.remove('selected');
    opts[selected].classList.add('wrong');
    const fb = document.getElementById('feedback');
    fb.className = 'feedback bad show';
    fb.textContent = '✗  Nope. Try again.';
    document.getElementById('submit-btn').className = 'submit-btn';

    setTimeout(() => {
      opts.forEach((b, idx) => { if (idx !== selected) b.classList.remove('disabled'); });
      opts[selected].classList.add('disabled'); // keep wrong choice locked out
      selected = null;
    }, 700);

    if (wrongCount >= 5) {
      const banner = document.getElementById('fail-banner');
      banner.className = 'fail-banner show';
      banner.textContent = `${wrongCount} wrong answers… are you actually a cousin? 👀`;
    }
  }
}

function showSuccess() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('success-screen').classList.add('show');
  sessionStorage.setItem('cousin-verified', '1');
}

function unlockGallery() {
  // Change 'index.html' to whatever your main gallery file is called
  window.location.href = 'gallery.html';
}

// Skip quiz if already passed this session
if (sessionStorage.getItem('cousin-verified') === '1') {
  unlockGallery();
} else {
  renderQuestion();
}
</script>
</body>
</html>
