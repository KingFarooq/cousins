<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Cousins | Memories</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<link href="https://fonts.cdnfonts.com/css/thegoodmonolith" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/InertiaPlugin.min.js"></script>

<style>
@font-face {
  font-family: "PPNeueMontreal";
  src: url("https://assets.codepen.io/7558/PPNeueMontreal-Variable.woff2") format("woff2");
  font-weight: 100 900;
  font-style: normal;
}

img {
  border-radius: 10px;
}

video {
  border-radius: 10px;
}

.play-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 48px;
  height: 48px;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.grid-item:hover .play-overlay {
  opacity: 0;
  transform: translate(-50%, -50%) scale(1.2);
}

/* ========================== */
/*         THEMES             */
/* ========================== */
:root,
[data-theme="void"] {
  --color-bg: #080808;
  --color-bg2: #111111;
  --color-bg3: #1a1a1a;
  --color-text: #f0f0f0;
  --color-text-dim: rgba(240,240,240,0.65);
  --color-text-muted: rgba(240,240,240,0.35);
  --color-accent: #e8c97e;
  --color-accent2: #c4784a;
  --color-accent-rgb: 232,201,126;
  --color-border: rgba(255,255,255,0.1);
  --color-border-hover: rgba(255,255,255,0.25);
  --color-card-bg: #141414;
  --color-card-hover: #1e1e1e;
  --color-overlay: rgba(8,8,8,0.97);
  --color-glass: rgba(20,20,20,0.85);
  --color-header-bg: rgba(8,8,8,0.95);
  --gradient-top: linear-gradient(to bottom, rgba(8,8,8,0.98) 0%, transparent 100%);
  --gradient-bottom: linear-gradient(to top, rgba(8,8,8,0.98) 0%, transparent 100%);
  --noise-opacity: 0.04;
  --preloader-gradient: radial-gradient(ellipse at center, #1a1a1a 0%, #080808 100%);
  --theme-name: "VOID";
}

[data-theme="cream"] {
  --color-bg: #f2ede6;
  --color-bg2: #ece5db;
  --color-bg3: #e5dcd0;
  --color-text: #1a1410;
  --color-text-dim: rgba(26,20,16,0.65);
  --color-text-muted: rgba(26,20,16,0.35);
  --color-accent: #b5541e;
  --color-accent2: #7a3b1e;
  --color-accent-rgb: 181,84,30;
  --color-border: rgba(26,20,16,0.12);
  --color-border-hover: rgba(26,20,16,0.3);
  --color-card-bg: #e8e2d9;
  --color-card-hover: #dfd7cc;
  --color-overlay: rgba(242,237,230,0.97);
  --color-glass: rgba(236,229,219,0.9);
  --color-header-bg: rgba(242,237,230,0.95);
  --gradient-top: linear-gradient(to bottom, rgba(242,237,230,0.98) 0%, transparent 100%);
  --gradient-bottom: linear-gradient(to top, rgba(242,237,230,0.98) 0%, transparent 100%);
  --noise-opacity: 0.06;
  --preloader-gradient: radial-gradient(ellipse at center, #ece5db 0%, #f2ede6 100%);
  --theme-name: "CREAM";
}

[data-theme="aurora"] {
  --color-bg: #060d1a;
  --color-bg2: #0a1525;
  --color-bg3: #0f1e30;
  --color-text: #e8f4f0;
  --color-text-dim: rgba(232,244,240,0.65);
  --color-text-muted: rgba(232,244,240,0.35);
  --color-accent: #4dffd2;
  --color-accent2: #a78bfa;
  --color-accent-rgb: 77,255,210;
  --color-border: rgba(77,255,210,0.15);
  --color-border-hover: rgba(77,255,210,0.35);
  --color-card-bg: #0d1a2a;
  --color-card-hover: #132030;
  --color-overlay: rgba(6,13,26,0.97);
  --color-glass: rgba(13,26,42,0.9);
  --color-header-bg: rgba(6,13,26,0.95);
  --gradient-top: linear-gradient(to bottom, rgba(6,13,26,0.98) 0%, transparent 100%);
  --gradient-bottom: linear-gradient(to top, rgba(6,13,26,0.98) 0%, transparent 100%);
  --noise-opacity: 0.03;
  --preloader-gradient: radial-gradient(ellipse at center, #0f1e30 0%, #060d1a 100%);
  --theme-name: "AURORA";
}

[data-theme="ember"] {
  --color-bg: #0f0806;
  --color-bg2: #1a0f08;
  --color-bg3: #221408;
  --color-text: #f5e8d5;
  --color-text-dim: rgba(245,232,213,0.65);
  --color-text-muted: rgba(245,232,213,0.35);
  --color-accent: #ff6b35;
  --color-accent2: #ffd700;
  --color-accent-rgb: 255,107,53;
  --color-border: rgba(255,107,53,0.18);
  --color-border-hover: rgba(255,107,53,0.4);
  --color-card-bg: #1a0f08;
  --color-card-hover: #231508;
  --color-overlay: rgba(15,8,6,0.97);
  --color-glass: rgba(26,15,8,0.9);
  --color-header-bg: rgba(15,8,6,0.95);
  --gradient-top: linear-gradient(to bottom, rgba(15,8,6,0.98) 0%, transparent 100%);
  --gradient-bottom: linear-gradient(to top, rgba(15,8,6,0.98) 0%, transparent 100%);
  --noise-opacity: 0.05;
  --preloader-gradient: radial-gradient(ellipse at center, #221408 0%, #0f0806 100%);
  --theme-name: "EMBER";
}

[data-theme="arctic"] {
  --color-bg: #f8fafc;
  --color-bg2: #f0f4f8;
  --color-bg3: #e8eff5;
  --color-text: #0f1f2e;
  --color-text-dim: rgba(15,31,46,0.6);
  --color-text-muted: rgba(15,31,46,0.35);
  --color-accent: #0066ff;
  --color-accent2: #00ccff;
  --color-accent-rgb: 0,102,255;
  --color-border: rgba(15,31,46,0.1);
  --color-border-hover: rgba(0,102,255,0.4);
  --color-card-bg: #edf2f7;
  --color-card-hover: #e2eaf3;
  --color-overlay: rgba(248,250,252,0.97);
  --color-glass: rgba(240,244,248,0.92);
  --color-header-bg: rgba(248,250,252,0.95);
  --gradient-top: linear-gradient(to bottom, rgba(248,250,252,0.98) 0%, transparent 100%);
  --gradient-bottom: linear-gradient(to top, rgba(248,250,252,0.98) 0%, transparent 100%);
  --noise-opacity: 0.02;
  --preloader-gradient: radial-gradient(ellipse at center, #e8eff5 0%, #f8fafc 100%);
  --theme-name: "ARCTIC";
}

/* ========================== */
/*           BASE             */
/* ========================== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; user-select:none; }

body {
  font-family: "PPNeueMontreal", -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  cursor: grab;
  -webkit-font-smoothing: antialiased;
  transition: background 0.6s ease, color 0.6s ease;
}
body.dragging { cursor: grabbing; }
body.modal-open { cursor: default; }

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity: var(--noise-opacity);
  pointer-events: none;
  z-index: 9999;
}

/* ========================== */
/*         PRELOADER          */
/* ========================== */
#preloader {
  position: fixed; inset: 0;
  background: var(--preloader-gradient);
  z-index: 99999;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
  overflow: hidden;
}
#preloader::after {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(var(--color-accent-rgb), 0.06) 0%, transparent 70%);
  border-radius: 50%;
  animation: pulse-glow 2s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.2); opacity: 1; }
}

.pl-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 72px;
  letter-spacing: 0.08em;
  color: var(--color-text);
  opacity: 0;
  position: relative; z-index: 1;
  animation: plSlideUp 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;
}
.pl-sub {
  font-family: "TheGoodMonolith", monospace;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--color-text-dim);
  opacity: 0;
  position: relative; z-index: 1;
  animation: plFade 0.8s ease 0.7s forwards;
}
.pl-bar-wrap {
  width: 180px; height: 1px;
  background: var(--color-border);
  overflow: hidden;
  opacity: 0;
  position: relative; z-index: 1;
  animation: plFade 0.5s ease 0.9s forwards;
}
.pl-bar {
  height: 100%; width: 0;
  background: linear-gradient(to right, transparent, var(--color-accent), transparent);
  animation: plLoad 1.4s ease 1s forwards;
}
.pl-count {
  font-family: "TheGoodMonolith", monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--color-accent);
  opacity: 0;
  position: relative; z-index: 1;
  animation: plFade 0.5s ease 1s forwards;
}
#pl-counter {
  display: inline-block;
  animation: countUp 1.4s ease 1s forwards;
}
@keyframes countUp {
  0% { content: '000'; }
  100% { content: '100'; }
}
@keyframes plSlideUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }
@keyframes plFade { to { opacity:1; } }
@keyframes plLoad { to { width:100%; } }

/* ========================== */
/*          HEADER            */
/* ========================== */
.header {
  position: fixed; top: 0; left: 0; width: 100vw;
  z-index: 2000; pointer-events: none;
  opacity: 0; transition: opacity 0.6s ease;
}
.header.visible { opacity: 1; }

.header-top-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px;
  pointer-events: auto;
  background: var(--color-header-bg);
  backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--color-border);
  position: relative;
  transition: background 0.6s ease, border-color 0.6s ease;
}

.header-top-bar::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0;
  height: 2px; width: 0;
  background: linear-gradient(to right, transparent, var(--color-accent), transparent);
  animation: headerScan 4s ease-in-out 2s infinite;
}
@keyframes headerScan {
  0% { left: -10%; width: 0; }
  40% { width: 30%; }
  100% { left: 110%; width: 0; }
}

/* Logo */
.logo-container {
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; text-decoration: none;
  position: relative;
}
.logo-mark {
  position: relative; width: 36px; height: 22px; flex-shrink: 0;
}
.circle {
  position: absolute; border-radius: 50%;
  width: 22px; height: 22px;
  background: var(--color-text);
  transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), background 0.6s;
  top: 0;
}
.circle-1 { left: 0; }
.circle-2 { left: 14px; mix-blend-mode: difference; }
.logo-container:hover .circle-1 { transform: translateX(-5px); }
.logo-container:hover .circle-2 { transform: translateX(5px); }

.logo-text {
  font-family: "TheGoodMonolith", monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--color-text);
  transition: color 0.6s;
  opacity: 0.8;
}

/* Header right controls */
.header-controls {
  display: flex; align-items: center; gap: 10px;
}

/* Theme switcher */
.theme-switcher {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--color-bg3);
  border: 1px solid var(--color-border);
  border-radius: 30px;
  padding: 4px 6px;
  transition: all 0.3s;
}
.theme-switcher:hover { border-color: var(--color-border-hover); }

.theme-dot {
  width: 18px; height: 18px; border-radius: 50%;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
  position: relative; flex-shrink: 0;
  border: 2px solid transparent;
}
.theme-dot:hover { transform: scale(1.3); }
.theme-dot.active { border-color: var(--color-text); transform: scale(1.15); }
.theme-dot.active::after {
  content: '';
  position: absolute; inset: -4px;
  border-radius: 50%;
  border: 1px solid var(--color-text);
  opacity: 0.4;
}
.td-void   { background: radial-gradient(circle at 30% 30%, #333, #080808); }
.td-cream  { background: radial-gradient(circle at 30% 30%, #ece5db, #b5541e); }
.td-aurora { background: radial-gradient(circle at 30% 30%, #4dffd2, #060d1a); }
.td-ember  { background: radial-gradient(circle at 30% 30%, #ff6b35, #0f0806); }
.td-arctic { background: radial-gradient(circle at 30% 30%, #0066ff, #f8fafc); }

/* Theme label */
.theme-label {
  font-family: "TheGoodMonolith", monospace;
  font-size: 9px; letter-spacing: 0.18em;
  color: var(--color-accent);
  text-transform: uppercase;
  transition: color 0.6s;
  padding: 0 4px;
}

/* Menu toggle */
.menu-toggle {
  background: var(--color-bg3);
  border: 1px solid var(--color-border);
  border-radius: 30px;
  padding: 8px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  font-family: "TheGoodMonolith", monospace;
  font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--color-text);
  transition: all 0.3s ease; backdrop-filter: blur(8px);
}
.menu-toggle:hover {
  background: var(--color-card-hover);
  border-color: var(--color-border-hover);
}
.menu-toggle-icon {
  font-size: 18px; line-height: 1;
  transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  display: inline-block;
}
.menu-toggle.active .menu-toggle-icon { transform: rotate(135deg); }

/* ========================== */
/*        MENU PANEL          */
/* ========================== */
.menu-panel {
  max-height: 0; opacity: 0; overflow: hidden;
  transition: max-height 0.6s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease;
  pointer-events: none;
  background: var(--color-glass);
  backdrop-filter: blur(24px) saturate(200%);
  border-bottom: 1px solid var(--color-border);
  transition: background 0.6s, border-color 0.6s, max-height 0.6s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease;
}
.menu-panel.open { max-height: 500px; opacity: 1; pointer-events: auto; }

.menu-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  column-gap: 16px;
  padding: 20px 24px 24px;
  position: relative;
}

.menu-grid::before {
  content: '';
  position: absolute;
  top: 0; left: 24px; right: 24px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--color-border), transparent);
}

.nav-section    { grid-column: 1 / span 3; }
.values-section { grid-column: 5 / span 2; }
.location-section { grid-column: 7 / span 2; }
.contact-section { grid-column: 9 / span 2; }
.social-section { grid-column: 11 / span 2; text-align: right; }

h3 {
  font-family: "TheGoodMonolith", monospace;
  font-size: 9px; font-weight: 400;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--color-accent);
  margin-bottom: 14px;
  transition: color 0.6s;
}

ul { list-style: none; }
li { margin-bottom: 5px; }

a, .event-link, .cousin-link, .media-link, .insta-link {
  position: relative; cursor: pointer;
  color: var(--color-text-dim);
  display: inline-block; text-decoration: none;
  font-size: 14px; font-weight: 500;
  letter-spacing: -0.01em;
  transition: color 0.25s ease;
  line-height: 1.5;
}
a::after, .event-link::after, .cousin-link::after, .media-link::after, .insta-link::after {
  content: ""; position: absolute; bottom: -2px; left: 0;
  width: 0; height: 1px;
  background: var(--color-accent);
  transition: width 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
a:hover::after, .event-link:hover::after, .cousin-link:hover::after, .media-link:hover::after, .insta-link:hover::after { width: 100%; }
a:hover, .event-link:hover, .cousin-link:hover, .media-link:hover, .insta-link:hover { color: var(--color-text); }
.event-link.active, .cousin-link.active, .media-link.active { color: var(--color-text); font-weight: 600; }
.event-link.active::after, .cousin-link.active::after, .media-link.active::after { width: 100%; height: 2px; }

/* ========================== */
/*         VIEWPORT           */
/* ========================== */
#viewport {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
  overflow: hidden; z-index: 1; opacity: 0;
}
#canvas-wrapper {
  position: absolute; top: 0; left: 0;
  transform-origin: 0 0;
  will-change: transform; isolation: isolate;
}
body.dragging #canvas-wrapper { cursor: grabbing; }
#grid-container { position: relative; padding: 80px 40px 40px; }

/* ========================== */
/*        GRID ITEMS          */
/* ========================== */
.grid-item {
  position: absolute; 
  width: 340px;
  height: 340px;
  background: var(--color-card-bg);
  cursor: pointer; 
  will-change: transform, opacity; 
  overflow: hidden;
  border-radius: 6px; 
  opacity: 1;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  border: 1px solid var(--color-border);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease, border-color 0.3s, background 0.6s, opacity 0.4s;
}
.grid-item:hover {
  transform: scale(1.025) translateY(-4px);
  z-index: 2;
  box-shadow: 0 16px 40px rgba(0,0,0,0.25), 0 0 0 1px rgba(var(--color-accent-rgb), 0.2);
  border-color: rgba(var(--color-accent-rgb), 0.25);
}
.grid-item.hidden { 
  opacity: 0 !important; 
  pointer-events: none; 
  transform: scale(0.96) !important; 
}

.grid-item .media-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.grid-item img, 
.grid-item video {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1), filter 0.4s ease;
  filter: saturate(0.9);
}

.grid-item:hover img, 
.grid-item:hover video {
  transform: scale(1.06);
  filter: saturate(1.1);
}

.media-badge {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  border-radius: 4px; padding: 3px 9px;
  font-family: "TheGoodMonolith", monospace;
  font-size: 9px; color: #fff;
  letter-spacing: 0.12em; text-transform: uppercase;
  border: 1px solid rgba(255,255,255,0.15);
  z-index: 2;
}

.item-number-badge {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
  border-radius: 4px; padding: 3px 9px;
  font-family: "TheGoodMonolith", monospace;
  font-size: 9px; color: var(--color-accent);
  letter-spacing: 0.06em;
  border: 1px solid rgba(var(--color-accent-rgb), 0.3);
  transition: color 0.6s;
  z-index: 2;
}

/* Reveal overlay shimmer on hover */
.grid-item::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(var(--color-accent-rgb), 0.08) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none; z-index: 1;
}
.grid-item:hover::after { opacity: 1; }

/* ========================== */
/*         LIGHTBOX           */
/* ========================== */
#lightbox {
  position: fixed; inset: 0; z-index: 5000;
  display: flex; align-items: center; justify-content: center;
  background: var(--color-overlay);
  backdrop-filter: blur(24px) saturate(150%);
  opacity: 0; pointer-events: none;
  transition: opacity 0.45s ease, background 0.6s;
}
#lightbox.active { opacity: 1; pointer-events: all; }

.lb-content {
  display: flex; align-items: center; gap: 56px;
  max-width: 90vw; max-height: 90vh;
}
#lightbox-media {
  display: flex;
  align-items: center;
  justify-content: center;
  max-width: 58vw; max-height: 78vh;
  border-radius: 8px;
  opacity: 0; transform: scale(0.93) translateY(20px);
  transition: all 0.55s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 30px 80px rgba(0,0,0,0.4);

/* ========================== THEMES ========================== */
const THEMES = { void:{label:"VOID"}, cream:{label:"CREAM"}, aurora:{label:"AURORA"}, ember:{label:"EMBER"}, arctic:{label:"ARCTIC"} };

function switchTheme(t) {
  const wipe = document.getElementById('theme-wipe');
  const label = document.getElementById('themeLabel');
  gsap.timeline()
    .to(wipe, { scaleX:1, duration:0.35, ease:"power2.in", transformOrigin:"left" })
    .call(() => { document.body.setAttribute('data-theme',t); label.textContent=THEMES[t].label; })
    .to(wipe, { scaleX:0, duration:0.4, ease:"power2.out", transformOrigin:"right" });
  document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.dataset.theme===t));
  localStorage.setItem('farooq-theme', t);
}

function initCursor() {
  const dot = document.getElementById('cursor-dot');
  document.addEventListener('mousemove', e => {
    dot.style.opacity='1';
    gsap.to(dot, { x:e.clientX, y:e.clientY, duration:0.15, ease:"power2.out" });
  });
  document.addEventListener('mouseleave', () => { dot.style.opacity='0'; });
}

function animateCounter() {
  const el = document.getElementById('pl-counter');
  let n = 0;
  const iv = setInterval(() => {
    n += Math.floor(Math.random()*8)+3;
    if (n>=100) { n=100; clearInterval(iv); }
    el.textContent = String(n).padStart(3,'0');
  }, 40);
}

/* ========================== GALLERY ========================== */
class CousinAlbum {
  constructor() {
    this.itemWidth = 340;
    this.gap = 28;
    this.cols = 0;
    this.currentZoom = 0.55;  // This is your zoom level
    this.minZoom = 0.3;
    this.maxZoom = 1.8;
    this.zoomStep = 0.1;
    this.allItems = [];
    this.draggable = null;
    this.lastPos = { x: 0, y: 0 };
    this.activeEvent = null;
    this.activeCousins = new Set();
    this.activeMedia = 'all';
    this.lbVisible = false;
    this.lbIndex = 0;
    this.filteredMedia = [];
    this.lbDir = 'right';
    this.vp = document.getElementById('viewport');
    this.cw = document.getElementById('canvas-wrapper');
    this.gc = document.getElementById('grid-container');
    this.lb = document.getElementById('lightbox');
    this._toastTimeout = null;
    this._pinchStartDist = null;
    this._pinchStartZoom = null;
    this.initMenuCollapse();
  }

  initMenuCollapse() {
    const btn = document.getElementById('menuToggleBtn');
    const panel = document.getElementById('menuPanel');
    btn.addEventListener('click', () => {
      const open = panel.classList.contains('open');
      panel.classList.toggle('open', !open);
      btn.classList.toggle('active', !open);
      if (!open) {
        gsap.fromTo(panel.querySelectorAll('li'),
          { opacity: 0, x: -12 },
          { opacity: 1, x: 0, duration: 0.4, stagger: 0.025, ease: "power3.out", delay: 0.1 }
        );
      }
    });
  }

  buildPanels() {
    const el = document.getElementById('event-list');
    el.innerHTML = '';
    [{ id: '', name: 'All Events' }, ...EVENTS].forEach(ev => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.className = 'event-link' + (ev.id === '' ? ' active' : '');
      a.dataset.id = ev.id;
      a.textContent = ev.name;
      a.addEventListener('click', e => { e.preventDefault(); this.setEventFilter(ev.id); });
      li.appendChild(a);
      el.appendChild(li);
    });

    const cl = document.getElementById('cousin-list');
    cl.innerHTML = '';
    [{ id: '', name: 'Everyone' }, ...COUSINS].forEach(c => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.className = 'cousin-link' + (c.id === '' ? ' active' : '');
      a.dataset.id = c.id;
      a.textContent = c.name;
      a.addEventListener('click', e => { e.preventDefault(); this.toggleCousinFilter(c.id); });
      li.appendChild(a);
      cl.appendChild(li);
    });

    const ml = document.getElementById('media-type-list');
    ml.innerHTML = '';
    [{ type: 'all', label: 'All Media' }, { type: 'photo', label: 'Photos' }, { type: 'video', label: 'Videos' }].forEach((mt, i) => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.className = 'media-link' + (i === 0 ? ' active' : '');
      a.dataset.type = mt.type;
      a.textContent = mt.label;
      a.addEventListener('click', e => {
        e.preventDefault();
        document.querySelectorAll('.media-link').forEach(l => l.classList.remove('active'));
        a.classList.add('active');
        this.activeMedia = mt.type;
        this.applyFilters();
        this.centerView();
      });
      li.appendChild(a);
      ml.appendChild(li);
    });

    const il = document.getElementById('insta-list');
    il.innerHTML = '';
    COUSINS.filter(c => c.instagram).forEach(c => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.className = 'insta-link';
      a.href = c.instagram;
      a.target = '_blank';
      a.textContent = `@${c.name.toLowerCase()}`;
      li.appendChild(a);
      il.appendChild(li);
    });
  }

    buildGrid() {
    this.gc.innerHTML = '';
    this.allItems = [];
    this.cols = Math.ceil(Math.sqrt(MEDIA.length * 1.3));

    MEDIA.forEach((m, i) => {
      const col = i % this.cols, row = Math.floor(i / this.cols);
      const x = col * (this.itemWidth + this.gap), y = row * (this.itemWidth + this.gap);
      const div = document.createElement('div');
      div.className = 'grid-item';
      div.style.left = x + 'px';
      div.style.top = y + 'px';
      div.style.width = this.itemWidth + 'px';
      div.style.height = this.itemWidth + 'px';
      div.dataset.event = m.eventId;
      div.dataset.cousins = m.cousins.join(',');
      div.dataset.type = m.type;
      div.dataset.index = i;

      const mw = document.createElement('div');
      mw.className = 'media-wrapper';
      
      if (m.type === 'photo') {
        const img = document.createElement('img');
        img.src = m.src;
        img.alt = m.title || '';
        img.loading = 'lazy';
        mw.appendChild(img);
      } else {
        // Video: prefer explicit thumb, otherwise use the video's first frame
        // as poster via #t=0.1 fragment (works reliably across modern browsers).
        if (m.thumb) {
          const img = document.createElement('img');
          img.src = m.thumb;
          img.alt = m.title || '';
          img.loading = 'lazy';
          mw.appendChild(img);
        } else {
          const vid = document.createElement('video');
          // #t=0.1 makes the browser show the frame at 0.1s as the poster
          vid.src = m.src + '#t=0.1';
          vid.muted = true;
          vid.playsInline = true;
          vid.preload = 'metadata';
          vid.setAttribute('playsinline', '');
          vid.setAttribute('disablepictureinpicture', '');
          mw.appendChild(vid);

          // Best-effort: try to upgrade to a cropped canvas thumbnail once
          // the metadata is ready. If anything fails (CORS, decode), we
          // simply keep the inline video poster — no broken state.
          const tryCanvasThumb = () => {
            try {
              const canvas = document.createElement('canvas');
              canvas.width = 340;
              canvas.height = 340;
              const ctx = canvas.getContext('2d');
              const vw = vid.videoWidth, vh = vid.videoHeight;
              if (!vw || !vh) return;
              const ratio = vw / vh;
              let sx, sy, sw, sh;
              if (ratio > 1) {
                sh = vh; sw = sh; sx = (vw - sw) / 2; sy = 0;
              } else {
                sw = vw; sh = sw; sx = 0; sy = (vh - sh) / 2;
              }
              ctx.drawImage(vid, sx, sy, sw, sh, 0, 0, 340, 340);
              const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
              const thumbImg = document.createElement('img');
              thumbImg.src = dataUrl;
              thumbImg.alt = m.title || '';
              vid.replaceWith(thumbImg);
            } catch (e) {
              // CORS or decode error — keep the video element as fallback.
            }
          };
          vid.addEventListener('loadeddata', () => { try { vid.currentTime = 0.1; } catch (_) {} });
          vid.addEventListener('seeked', tryCanvasThumb, { once: true });
        }

        // Play overlay (visible by default, fades on hover)
        const play = document.createElement('div');
        play.className = 'play-overlay';
        play.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>';
        mw.appendChild(play);

        // Video badge
        const badge = document.createElement('div');
        badge.className = 'media-badge';
        badge.textContent = 'VIDEO';
        mw.appendChild(badge);
      }
      
      div.appendChild(mw);
      const nb = document.createElement('div');
      nb.className = 'item-number-badge';
      nb.textContent = `#${String(i + 1).padStart(3, '0')}`;
      div.appendChild(nb);
      div.addEventListener('click', () => this.openLightbox(i));
      this.gc.appendChild(div);
      this.allItems.push({ el: div, media: m, index: i, x, y });
    });

    const rows = Math.ceil(MEDIA.length / this.cols);
    const w = this.cols * (this.itemWidth + this.gap) - this.gap;
    const h = rows * (this.itemWidth + this.gap) - this.gap;
    this.cw.style.width = w + 'px';
    this.cw.style.height = h + 'px';
    this.gc.style.width = w + 'px';
    this.gc.style.height = h + 'px';
  }

  setEventFilter(evId) {
    this.activeEvent = evId || null;
    document.querySelectorAll('.event-link').forEach(el => el.classList.toggle('active', el.dataset.id === (evId || '')));
    this.applyFilters();
    this.centerView();
  }

  toggleCousinFilter(cousinId) {
    if (!cousinId) this.activeCousins.clear();
    else {
      this.activeCousins.has(cousinId) ? this.activeCousins.delete(cousinId) : this.activeCousins.add(cousinId);
    }
    document.querySelectorAll('.cousin-link').forEach(el => {
      if (!el.dataset.id) el.classList.toggle('active', this.activeCousins.size === 0);
      else el.classList.toggle('active', this.activeCousins.has(el.dataset.id));
    });
    this.applyFilters();
    this.centerView();
  }

  applyFilters() {
    let visible = 0;
    this.filteredMedia = [];
    this.allItems.forEach(item => {
      let show = true;
      if (this.activeEvent && item.media.eventId !== this.activeEvent) show = false;
      if (this.activeCousins.size > 0 && ![...this.activeCousins].every(c => item.media.cousins.includes(c))) show = false;
      if (this.activeMedia !== 'all' && item.media.type !== this.activeMedia) show = false;
      show ? (item.el.classList.remove('hidden'), this.filteredMedia.push(item), visible++) : item.el.classList.add('hidden');
    });
    document.getElementById('footer-count').textContent = `${visible} / ${this.allItems.length} items`;

    const af = document.getElementById('active-filters');
    af.innerHTML = '';
    const addTag = (label, onClick) => {
      const tag = document.createElement('div');
      tag.className = 'active-tag';
      tag.innerHTML = label + ' <span>×</span>';
      tag.addEventListener('click', onClick);
      af.appendChild(tag);
    };
    if (this.activeEvent) {
      const ev = EVENTS.find(e => e.id === this.activeEvent);
      if (ev) addTag(ev.name, () => { this.setEventFilter(''); this.centerView(); });
    }
    this.activeCousins.forEach(c => {
      const cousin = COUSINS.find(x => x.id === c);
      if (cousin) addTag(cousin.name, () => { this.toggleCousinFilter(c); this.centerView(); });
    });
    if (this.activeMedia !== 'all') addTag(this.activeMedia + 's', () => {
      this.activeMedia = 'all';
      document.querySelectorAll('.media-link').forEach((c, i) => c.classList.toggle('active', i === 0));
      this.applyFilters();
      this.centerView();
    });
    const nr = document.getElementById('no-results');
    visible === 0 ? nr.classList.add('show') : nr.classList.remove('show');
  }

  centerView() {
    setTimeout(() => {
      const b = this.getCanvasBounds();
      gsap.to(this.cw, {
        x: b.defaultX, y: b.defaultY, duration: 0.7, ease: "power3.inOut",
        onComplete: () => {
          this.lastPos = { x: b.defaultX, y: b.defaultY };
          this.updateDraggableBounds();
        }
      });
    }, 50);
  }

  setZoom(newZoom, anchorClientX, anchorClientY, animate = true) {
    const z = Math.max(this.minZoom, Math.min(this.maxZoom, newZoom));
    if (Math.abs(z - this.currentZoom) < 0.001) return;

    // Get current canvas position
    const currentX = this.draggable ? this.draggable[0].x : this.lastPos.x;
    const currentY = this.draggable ? this.draggable[0].y : this.lastPos.y;
    const oldZoom = this.currentZoom;

    // Compute anchor in viewport coords (default to center if not provided)
    const ax = (anchorClientX != null) ? anchorClientX : window.innerWidth / 2;
    const ay = (anchorClientY != null) ? anchorClientY : window.innerHeight / 2;

    // Position in canvas (pre-scale) coordinates under anchor before zoom
    const canvasPointX = (ax - currentX) / oldZoom;
    const canvasPointY = (ay - currentY) / oldZoom;

    // New translation so the same canvas point stays under the anchor
    let newX = ax - canvasPointX * z;
    let newY = ay - canvasPointY * z;

    this.currentZoom = z;

    // Clamp against new bounds
    const b = this._computeBoundsForZoom(z);
    newX = Math.max(b.minX, Math.min(b.maxX, newX));
    newY = Math.max(b.minY, Math.min(b.maxY, newY));

    if (animate) {
      gsap.to(this.cw, {
        scale: z, x: newX, y: newY,
        duration: 0.32, ease: "power2.out",
        onUpdate: () => { if (this.draggable) this.draggable[0].update(false, false); },
        onComplete: () => {
          this.lastPos = { x: newX, y: newY };
          this.updateDraggableBounds();
        }
      });
    } else {
      gsap.set(this.cw, { scale: z, x: newX, y: newY });
      this.lastPos = { x: newX, y: newY };
      this.updateDraggableBounds();
    }

    this.updateZoomUI();
  }

  _computeBoundsForZoom(zoom) {
    const vw = window.innerWidth, vh = window.innerHeight;
    const w = parseFloat(this.cw.style.width) * zoom;
    const h = parseFloat(this.cw.style.height) * zoom;
    return {
      minX: w <= vw ? (vw - w) / 2 : vw - w - 100,
      maxX: w <= vw ? (vw - w) / 2 : 100,
      minY: h <= vh ? (vh - h) / 2 : vh - h - 100,
      maxY: h <= vh ? (vh - h) / 2 : 100,
    };
  }

  updateZoomUI() {
    const label = document.getElementById('zoomLabel');
    const thumb = document.getElementById('zoomThumb');
    if (label) label.textContent = Math.round(this.currentZoom * 100) + '%';
    if (thumb) {
      const pct = (this.currentZoom - this.minZoom) / (this.maxZoom - this.minZoom);
      thumb.style.width = Math.max(6, Math.min(100, pct * 100)) + '%';
    }
    this._showZoomToast(Math.round(this.currentZoom * 100) + '%');
  }

  _showZoomToast(text) {
    const toast = document.getElementById('zoom-toast');
    if (!toast) return;
    toast.textContent = text;
    toast.style.opacity = '1';
    clearTimeout(this._toastTimeout);
    this._toastTimeout = setTimeout(() => { toast.style.opacity = '0'; }, 800);
  }

  resetZoom() {
    this.setZoom(0.55);
    setTimeout(() => this.centerView(), 50);
  }

  openLightbox(mediaIndex) {
    const fi = this.filteredMedia.findIndex(i => i.index === mediaIndex);
    if (fi === -1) return;
    this.lbIndex = fi;
    this.lbVisible = true;
    document.body.classList.add('modal-open');
    this.lb.classList.add('active');
    this.renderLightboxItem();
  }

  renderLightboxItem() {
    const item = this.filteredMedia[this.lbIndex];
    if (!item) return;
    const ev = EVENTS.find(e => e.id === item.media.eventId);
    const cousins = item.media.cousins.map(cid => COUSINS.find(c => c.id === cid)?.name).filter(Boolean).join(', ');
    const globalIndex = this.allItems.findIndex(i => i.index === item.index);

    const lbMediaDiv = document.getElementById('lightbox-media');
    lbMediaDiv.innerHTML = '';

    const dlBtn = document.getElementById('lb-download-btn');

    if (item.media.type === 'photo') {
      const img = document.createElement('img');
      img.src = item.media.src;
      img.alt = item.media.title || '';
      lbMediaDiv.appendChild(img);
    } else {
      const vid = document.createElement('video');
      vid.src = item.media.src;
      vid.controls = true;
      vid.autoplay = true;
      vid.playsInline = true;
      vid.setAttribute('playsinline', '');
      lbMediaDiv.appendChild(vid);
    }
    // Download button works for both photos and videos
    dlBtn.classList.remove('hidden');
    dlBtn.href = item.media.src;
    dlBtn.setAttribute('download', item.media.src.split('/').pop());
    dlBtn.title = `Download ${item.media.type === 'video' ? 'video' : 'image'}`;

    document.getElementById('lb-tag').textContent = ev?.name || 'Memory';
    document.getElementById('lb-title').textContent = item.media.title || ev?.name || '';
    document.getElementById('lb-description').textContent = item.media.desc || 'A beautiful memory.';
    document.getElementById('lb-event-name').textContent = ev?.name || '';
    document.getElementById('lb-date').textContent = ev?.date || '';
    document.getElementById('lb-cousins').textContent = cousins || 'Everyone';
    document.getElementById('lb-number').textContent = `#${String(globalIndex + 1).padStart(3, '0')} / ${this.allItems.length}`;
  }

  closeLightbox() {
    this.lbVisible = false;
    document.body.classList.remove('modal-open');
    this.lb.classList.remove('active');
    document.getElementById('lightbox-media').innerHTML = '';
  }

  lbNext() {
    if (!this.filteredMedia.length) return;
    this.lbIndex = (this.lbIndex + 1) % this.filteredMedia.length;
    this.renderLightboxItem();
  }

  lbPrev() {
    if (!this.filteredMedia.length) return;
    this.lbIndex = (this.lbIndex - 1 + this.filteredMedia.length) % this.filteredMedia.length;
    this.renderLightboxItem();
  }

  getCanvasBounds() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const w = parseFloat(this.cw.style.width) * this.currentZoom;
    const h = parseFloat(this.cw.style.height) * this.currentZoom;
    return {
      width: w, height: h,
      minX: w <= vw ? (vw - w) / 2 : vw - w - 100,
      maxX: w <= vw ? (vw - w) / 2 : 100,
      minY: h <= vh ? (vh - h) / 2 : vh - h - 100,
      maxY: h <= vh ? (vh - h) / 2 : 100,
      defaultX: (vw - w) / 2,
      defaultY: (vh - h) / 2
    };
  }

  updateDraggableBounds() {
    if (this.draggable?.[0]) {
      const b = this.getCanvasBounds();
      this.draggable[0].applyBounds({ minX: b.minX, maxX: b.maxX, minY: b.minY, maxY: b.maxY });
    } else this.initDraggable();
  }

  initDraggable() {
    if (this.draggable) {
      this.draggable[0].kill();
      this.draggable = null;
    }
    const b = this.getCanvasBounds();
    this.draggable = Draggable.create(this.cw, {
      type: 'x,y',
      bounds: { minX: b.minX, maxX: b.maxX, minY: b.minY, maxY: b.maxY },
      edgeResistance: 0.85, inertia: true,
      onDragStart: () => document.body.classList.add('dragging'),
      onDragEnd: () => {
        document.body.classList.remove('dragging');
        this.lastPos = { x: this.draggable[0].x, y: this.draggable[0].y };
      }
    });
  }

  playIntro() {
    gsap.to(this.vp, { opacity: 1, duration: 0.8, ease: "power2.out" });
    const els = this.allItems.map(i => i.el);
    gsap.fromTo(els,
      { opacity: 0, y: 50, scale: 0.94 },
      {
        opacity: 1, y: 0, scale: 1, duration: 0.8, stagger: { amount: 1.5, from: "center" }, ease: "power3.out",
        onComplete: () => {
          setTimeout(() => {
            this.initDraggable();
            document.getElementById('header').classList.add('visible');
            document.getElementById('footer').classList.add('visible');
          }, 200);
        }
      }
    );
  }

  init() {
    this.buildPanels();
    this.buildGrid();
    this.applyFilters();
    gsap.set(this.cw, { scale: this.currentZoom });
    const b = this.getCanvasBounds();
    gsap.set(this.cw, { x: b.defaultX, y: b.defaultY });
    this.lastPos = { x: b.defaultX, y: b.defaultY };

    document.getElementById('footer-date').textContent = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    document.getElementById('lb-prev').addEventListener('click', () => this.lbPrev());
    document.getElementById('lb-next').addEventListener('click', () => this.lbNext());
    document.getElementById('lb-close').addEventListener('click', () => this.closeLightbox());
    this.lb.addEventListener('click', e => { if (e.target === this.lb) this.closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (!this.lbVisible) return;
      if (e.key === 'ArrowRight') { e.preventDefault(); this.lbNext(); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); this.lbPrev(); }
      if (e.key === 'Escape') this.closeLightbox();
    });

    let rt;
    window.addEventListener('resize', () => {
      clearTimeout(rt);
      rt = setTimeout(() => {
        const b = this.getCanvasBounds();
        gsap.to(this.cw, { x: b.defaultX, y: b.defaultY, duration: 0.4 });
        this.updateDraggableBounds();
      }, 100);
    });

    // Wheel: ctrl/cmd+wheel zooms, plain wheel pans vertically.
    this.vp.addEventListener('wheel', e => {
      e.preventDefault();
      if (e.ctrlKey || e.metaKey) {
        const dir = e.deltaY > 0 ? -1 : 1;
        const factor = 1 + (this.zoomStep * dir);
        this.setZoom(this.currentZoom * factor, e.clientX, e.clientY, false);
      } else {
        const currentY = this.draggable ? this.draggable[0].y : this.lastPos.y;
        const b = this.getCanvasBounds();
        const newY = Math.max(b.minY, Math.min(b.maxY, currentY - e.deltaY));
        gsap.to(this.cw, {
          y: newY, duration: 0.4,
          onUpdate: () => { if (this.draggable) this.draggable[0].update(false, false); },
          onComplete: () => { this.lastPos = { x: this.draggable ? this.draggable[0].x : this.lastPos.x, y: newY }; }
        });
      }
    }, { passive: false });

    // Touch pinch-zoom
    this.vp.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        this._pinchStartDist = Math.hypot(dx, dy);
        this._pinchStartZoom = this.currentZoom;
      }
    }, { passive: true });
    this.vp.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && this._pinchStartDist) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        this.setZoom(this._pinchStartZoom * (dist / this._pinchStartDist), cx, cy, false);
      }
    }, { passive: false });
    this.vp.addEventListener('touchend', e => {
      if (e.touches.length < 2) {
        this._pinchStartDist = null;
        this._pinchStartZoom = null;
      }
    });

    // Zoom controls UI
    document.getElementById('zoomIn').addEventListener('click', () => this.setZoom(this.currentZoom + this.zoomStep));
    document.getElementById('zoomOut').addEventListener('click', () => this.setZoom(this.currentZoom - this.zoomStep));
    document.getElementById('zoomReset').addEventListener('click', () => this.resetZoom());
    document.getElementById('zoomControls').classList.add('visible');

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (this.lbVisible) return;
      if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '+')) {
        e.preventDefault();
        this.setZoom(this.currentZoom + this.zoomStep);
      } else if ((e.ctrlKey || e.metaKey) && e.key === '-') {
        e.preventDefault();
        this.setZoom(this.currentZoom - this.zoomStep);
      } else if ((e.ctrlKey || e.metaKey) && e.key === '0') {
        e.preventDefault();
        this.resetZoom();
      }
    });

    this.updateZoomUI();
    this.playIntro();
  }
}

/* ========================== BOOT ========================== */
window.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem('farooq-theme')||'void';
  document.body.setAttribute('data-theme',saved);
  document.getElementById('themeLabel').textContent=THEMES[saved].label;
  document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active',d.dataset.theme===saved));
  document.querySelectorAll('.theme-dot').forEach(d=>d.addEventListener('click',()=>switchTheme(d.dataset.theme)));
  initCursor();
  animateCounter();

  setTimeout(()=>{
    const pre=document.getElementById('preloader');
    gsap.to(pre,{opacity:0,y:-30,duration:0.9,ease:'power3.in',onComplete:()=>{
      pre.remove();
      const g=new CousinAlbum();
      g.init();
    }});
  },2400);
});
</script>
